<!DOCTYPE html>
 <html lang="en">
   <head>
     <meta charset="UTF-8"> 
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Medication Reminder | ElderConnect</title>
       <link rel="stylesheet" href="style.css"> 
    </head>
 <body>
  <header class="navbar">
     <h1>ElderConnect</h1>
      <nav>
         <a href="index.html">🏠 Home</a> 
         <a href="reminders.html" class="active">💊 <span>Medication</span></a> 
         <a href="appointments.html">📅 <span>Appointments</span></a> 
         <a href="about.html">ℹ️ <span>About</span></a> 
      </nav>
  </header>
   <main class="form-wrapper">
     <h2>💊 Set a Medication Reminder</h2> 
     <form id="reminderForm" class="reminder-form">
       <label for="name">👵 Elder's Name</label> 
       <input type="text" id="name" required> 
       <label for="phone">📞 Phone Number</label>
        <input type="text" id="phone" required> <label for="message">📝 Reminder Message</label> 
        <textarea id="message" required></textarea> <label for="reminderTime">⏰ Reminder Time</label>
         <input type="time" id="reminderTime" required> <label for="frequency">🔁 Reminder Frequency</label>
          <select id="frequency">
             <option value="daily">Daily</option> 
             <option value="custom">Custom</option> 
          </select>
           <div id="customDays" style="display: none;">
             <label><input type="checkbox" value="Monday"> Monday</label> 
             <label><input type="checkbox" value="Tuesday"> Tuesday</label>
              <label><input type="checkbox" value="Wednesday"> Wednesday</label> 
              <label><input type="checkbox" value="Thursday"> Thursday</label>
               <label><input type="checkbox" value="Friday"> Friday</label>
                <label><input type="checkbox" value="Saturday"> Saturday</label>
                 <label><input type="checkbox" value="Sunday"> Sunday</label>
                 </div>
                  <p class="info-text">⏰ A Reminder will be sent <strong>10 Minutes before</strong> the Medication.</p> 
                  <label for="reminderType">Reminder Type</label> 
                  <select id="reminderType"> 
                    <option value="call">📞 Call</option> 
                    <option value="sms">💬 SMS</option> 
                    <option value="email">📧 Email</option> 
                  </select> <!-- Hidden Email Input Field -->
                   <div id="emailField" style="display: none;">
                    <label for="email">📧 Email Address</label>
                     <input type="email" id="email">
                     </div> 
                     <button type="submit" id="sendBtn">📞 Send Reminder</button> 
                    </form> 
                    <p id="statusMsg"></p>
                   </main>
                    <footer> 
                      
                      <p>❤️ ElderConnect – Health & Happiness</p> 
                    </footer> 
         <script src="script.js"></script>
  </body> 
</html>
